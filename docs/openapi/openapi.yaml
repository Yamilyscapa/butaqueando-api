openapi: 3.0.3
info:
  title: Butaqueando API
  version: 0.1.0
  description: |
    Backend API for Butaqueando.

    This document currently describes endpoints that are already implemented and
    stable in the codebase:
    - system root
    - health/readiness
    - plays endpoints (read, reviews/comments, engagements, submissions/moderation)
    - auth (sign-up, sign-in, refresh, sign-out)
    - users profile endpoints (/users/me and public profile)
    - follows (follow/unfollow and follow graph listings)

servers:
  - url: http://localhost:3000
    description: Local development

tags:
  - name: system
  - name: health
  - name: plays
  - name: auth
  - name: users
  - name: follows

paths:
  /:
    get:
      tags: [system]
      summary: Root status endpoint
      parameters:
        - $ref: '#/components/parameters/XRequestID'
      responses:
        '200':
          description: API is reachable
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RootSuccessEnvelope'
              examples:
                ok:
                  value:
                    data:
                      name: butaqueando-api
                      status: ok
                    error: null
                    requestId: req-2d522c7f73a64f2a8f72d6a8575567b0

  /v1/health:
    get:
      tags: [health]
      summary: Readiness health check
      description: |
        Returns service readiness. If dependencies are unavailable, responds with
        a standardized error envelope.
      parameters:
        - $ref: '#/components/parameters/XRequestID'
      responses:
        '200':
          description: Service is healthy
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthSuccessEnvelope'
              examples:
                healthy:
                  value:
                    data:
                      ok: true
                      database: true
                      timestamp: '2026-03-29T21:15:50.123456789Z'
                    error: null
                    requestId: req-f3fc79d4f9f2488dbf618dbf0d4347df
        '503':
          description: Service unavailable
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                unavailable:
                  value:
                    data: null
                    error:
                      code: SERVICE_UNAVAILABLE
                      message: service unavailable
                      details:
                        database: false
                    requestId: req-99d4f39646e94d65bd5ac744cf8a6c89

  /v1/feed:
    get:
      tags: [plays]
      summary: List discovery feed plays
      description: |
        Returns published plays for feed sections.

        Supported sections:
        - `highlighted`
        - `trending` (supports optional `genreId` filter)
        - `genre` (requires `genreId`)
      parameters:
        - $ref: '#/components/parameters/XRequestID'
        - name: section
          in: query
          required: true
          schema:
            type: string
            enum: [highlighted, trending, genre]
        - name: genreId
          in: query
          required: false
          description: Required when `section=genre`; optional filter when `section=trending`.
          schema:
            type: string
            format: uuid
        - name: cursor
          in: query
          required: false
          description: Opaque cursor. For `section=trending`, cursor payload is section-specific and must be reused only with `section=trending`.
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
      responses:
        '200':
          description: Feed list loaded
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlayListSuccessEnvelope'
        '400':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalError'

  /v1/search:
    get:
      tags: [plays]
      summary: Search published plays
      parameters:
        - $ref: '#/components/parameters/XRequestID'
        - name: q
          in: query
          required: false
          schema:
            type: string
        - name: genreId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: city
          in: query
          required: false
          schema:
            type: string
        - name: theater
          in: query
          required: false
          schema:
            type: string
        - name: availabilityStatus
          in: query
          required: false
          schema:
            type: string
            enum: [in_theaters, archive]
        - name: cursor
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
      responses:
        '200':
          description: Search results loaded
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlayListSuccessEnvelope'
        '400':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalError'

  /v1/plays/{playId}:
    get:
      tags: [plays]
      summary: Get published play details
      parameters:
        - $ref: '#/components/parameters/XRequestID'
        - name: playId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Play details loaded
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlayDetailsSuccessEnvelope'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /v1/plays/{playId}/reviews:
    get:
      tags: [plays]
      summary: List published reviews for a play
      parameters:
        - $ref: '#/components/parameters/XRequestID'
        - name: playId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: cursor
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
      responses:
        '200':
          description: Review list loaded
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewListSuccessEnvelope'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

    post:
      tags: [plays]
      summary: Create a review for a play
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XRequestID'
        - name: playId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReviewRequest'
            examples:
              default:
                value:
                  rating: 5
                  title: Excelente puesta
                  body: Gran direccion y actuaciones memorables.
                  containsSpoilers: false
      responses:
        '201':
          description: Review created
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewSuccessEnvelope'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/ReviewAlreadyExists'
        '500':
          $ref: '#/components/responses/InternalError'

  /v1/plays/{playId}/engagements:
    post:
      tags: [plays]
      summary: Set engagement state for a play
      description: |
        Supported kinds:
        - `wishlist`
        - `attended`

        Rule: setting `attended` clears `wishlist` for the same play.
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XRequestID'
        - name: playId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetEngagementRequest'
            examples:
              wishlist:
                value:
                  kind: wishlist
              attended:
                value:
                  kind: attended
      responses:
        '200':
          description: Engagement state updated
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EngagementStateSuccessEnvelope'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /v1/plays/{playId}/engagements/{kind}:
    delete:
      tags: [plays]
      summary: Delete engagement state for a play kind
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XRequestID'
        - name: playId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: kind
          in: path
          required: true
          schema:
            type: string
            enum: [wishlist, attended]
      responses:
        '200':
          description: Engagement state updated
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EngagementStateSuccessEnvelope'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /v1/reviews/{reviewId}:
    patch:
      tags: [plays]
      summary: Update your own review
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XRequestID'
        - name: reviewId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateReviewRequest'
            examples:
              updateRatingAndBody:
                value:
                  rating: 4
                  body: Actualizo mi opinion despues de una segunda funcion.
      responses:
        '200':
          description: Review updated
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewSuccessEnvelope'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /v1/reviews/{reviewId}/comments:
    post:
      tags: [plays]
      summary: Create a flat comment on a review
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XRequestID'
        - name: reviewId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReviewCommentRequest'
            examples:
              default:
                value:
                  body: Coincido con tu punto sobre la direccion.
      responses:
        '201':
          description: Review comment created
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewCommentSuccessEnvelope'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /v1/submissions/plays:
    post:
      tags: [plays]
      summary: Create a new play submission
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XRequestID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSubmissionRequest'
      responses:
        '201':
          description: Submission created
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmissionSuccessEnvelope'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /v1/me/bookmarks:
    get:
      tags: [plays]
      summary: List bookmarked plays for authenticated user
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XRequestID'
        - name: cursor
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
      responses:
        '200':
          description: Bookmarked plays loaded
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MyEngagementPlayListSuccessEnvelope'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /v1/me/watched:
    get:
      tags: [plays]
      summary: List watched plays for authenticated user
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XRequestID'
        - name: cursor
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
      responses:
        '200':
          description: Watched plays loaded
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MyEngagementPlayListSuccessEnvelope'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /v1/me/submissions/plays:
    get:
      tags: [plays]
      summary: List my play submissions
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XRequestID'
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [pending, published, rejected]
        - name: cursor
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
      responses:
        '200':
          description: Submission list loaded
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmissionListSuccessEnvelope'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /v1/me/submissions/plays/{playId}:
    patch:
      tags: [plays]
      summary: Edit and resubmit your play submission
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XRequestID'
        - name: playId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSubmissionRequest'
      responses:
        '200':
          description: Submission updated
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmissionSuccessEnvelope'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/InvalidCurationTransition'
        '500':
          $ref: '#/components/responses/InternalError'

  /v1/admin/submissions/plays:
    get:
      tags: [plays]
      summary: List submissions for moderation
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XRequestID'
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [pending, published, rejected]
        - name: cursor
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
      responses:
        '200':
          description: Submission list loaded
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmissionListSuccessEnvelope'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

  /v1/admin/submissions/plays/{playId}/approve:
    post:
      tags: [plays]
      summary: Approve pending play submission
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XRequestID'
        - name: playId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Submission approved
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmissionSuccessEnvelope'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/InvalidCurationTransition'
        '500':
          $ref: '#/components/responses/InternalError'

  /v1/admin/submissions/plays/{playId}/reject:
    post:
      tags: [plays]
      summary: Reject pending play submission
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XRequestID'
        - name: playId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RejectSubmissionRequest'
      responses:
        '200':
          description: Submission rejected
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmissionSuccessEnvelope'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/InvalidCurationTransition'
        '500':
          $ref: '#/components/responses/InternalError'

  /v1/admin/review-comments/{commentId}/status:
    patch:
      tags: [plays]
      summary: Update review comment moderation status
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XRequestID'
        - name: commentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateReviewCommentStatusRequest'
      responses:
        '200':
          description: Review comment status updated
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewCommentStatusSuccessEnvelope'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /v1/auth/sign-up:
    post:
      tags: [auth]
      summary: Register a new user
      description: |
        Creates a pending user account and an email verification token.

        Behavior notes:
        - `verificationToken` is exposed only outside production.
        - `emailVerificationRequired` reflects the runtime flag
          `EMAIL_VERIFICATION_REQUIRED`.
      parameters:
        - $ref: '#/components/parameters/XRequestID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignUpRequest'
            examples:
              default:
                value:
                  displayName: Ana Torres
                  email: ana@example.com
                  password: password123
      responses:
        '201':
          description: User created
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SignUpSuccessEnvelope'
              examples:
                devBypassOff:
                  summary: Verification required
                  value:
                    data:
                      userId: 0f36ccde-34c7-4470-b4db-3b7f8ff7f61b
                      email: ana@example.com
                      emailVerificationRequired: true
                    error: null
                    requestId: req-7f6c1ff7e8154e3d9e541c74afae5688
                devBypassOn:
                  summary: Verification bypassed in development
                  value:
                    data:
                      userId: a3a4de52-2cc0-4af7-bbdb-3ee94f75d6b9
                      email: ana@example.com
                      emailVerificationRequired: false
                      verificationToken: m_5KAjfM4lA6cQdA2adQEcZDYMT1cA1q8Sz7sA4laLk
                    error: null
                    requestId: req-57f50bd39da3408faaf4f9ecb0527d4a
        '400':
          $ref: '#/components/responses/ValidationError'
        '409':
          description: Email already in use
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                duplicate:
                  value:
                    data: null
                    error:
                      code: EMAIL_ALREADY_IN_USE
                      message: email already in use
                    requestId: req-0a087b5afba54c8f8d9f87fd41ad2f48
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'

  /v1/auth/sign-in:
    post:
      tags: [auth]
      summary: Sign in with email and password
      parameters:
        - $ref: '#/components/parameters/XRequestID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignInRequest'
            examples:
              default:
                value:
                  email: ana@example.com
                  password: password123
      responses:
        '200':
