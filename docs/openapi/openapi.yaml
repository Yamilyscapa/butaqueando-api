components:
  parameters:
    XRequestID:
      name: X-Request-ID
      in: header
      required: false
      description: Optional request correlation ID. If omitted, the server generates one.
      schema:
        type: string

  headers:
    XRequestID:
      description: Request correlation ID.
      schema:
        type: string

  responses:
    ValidationError:
      description: Request validation failed
      headers:
        X-Request-ID:
          $ref: '#/components/headers/XRequestID'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          examples:
            invalidPayload:
              value:
                data: null
                error:
                  code: VALIDATION_ERROR
                  message: invalid request body
                  details:
                    cause: "field validation failed"
                requestId: req-95f3450f38c9498cb4fc7c882f69fa4f

    Unauthorized:
      description: Invalid authentication credentials or token
      headers:
        X-Request-ID:
          $ref: '#/components/headers/XRequestID'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          examples:
            unauthorized:
              value:
                data: null
                error:
                  code: UNAUTHORIZED
                  message: invalid email or password
                requestId: req-8eb90f4f5a9f4f7f895243f37d5dc9c6

    Forbidden:
      description: Authenticated but not allowed to perform the action
      headers:
        X-Request-ID:
          $ref: '#/components/headers/XRequestID'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          examples:
            forbidden:
              value:
                data: null
                error:
                  code: FORBIDDEN
                  message: you can only edit your own reviews
                requestId: req-d1f6a5f2b0244f6ab00f9ebf9881c5c0

    RateLimited:
      description: Too many requests
      headers:
        X-Request-ID:
          $ref: '#/components/headers/XRequestID'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          examples:
            limitExceeded:
              value:
                data: null
                error:
                  code: RATE_LIMITED
                  message: too many requests
                  details:
                    limit: 15
                    windowSeconds: 60
                    retryAfterSeconds: 42
                requestId: req-c9ec41fc5da643f8aaf6204fd4386c5c

    InternalError:
      description: Unexpected server error
      headers:
        X-Request-ID:
          $ref: '#/components/headers/XRequestID'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          examples:
            internal:
              value:
                data: null
                error:
                  code: INTERNAL_ERROR
                  message: internal server error
                requestId: req-38f499d34799436b9877f2da80108112

    NotFound:
      description: Requested resource not found
      headers:
        X-Request-ID:
          $ref: '#/components/headers/XRequestID'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          examples:
            notFound:
              value:
                data: null
                error:
                  code: NOT_FOUND
                  message: user profile not found
                requestId: req-cfce9c26895a4419af84f22684f273d9

    ReviewAlreadyExists:
      description: Review for this play already exists
      headers:
        X-Request-ID:
          $ref: '#/components/headers/XRequestID'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          examples:
            duplicate:
              value:
                data: null
                error:
                  code: REVIEW_ALREADY_EXISTS
                  message: review already exists
                requestId: req-b3269f9e4ce84d4ca6db20d3d07dd97d

    InvalidCurationTransition:
      description: Invalid curation state transition
      headers:
        X-Request-ID:
          $ref: '#/components/headers/XRequestID'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          examples:
            invalidTransition:
              value:
                data: null
                error:
                  code: INVALID_CURATION_TRANSITION
                  message: invalid curation status transition
                  details:
                    from: rejected
                    to: published
                requestId: req-d4f95f1937244f64b91f8af5ca9825de

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    NullValue:
      nullable: true
      description: Must be null.
      example: null

    ErrorObject:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string
        details:
          description: Optional machine-readable error details.

    ErrorEnvelope:
      type: object
      required:
        - data
        - error
        - requestId
      properties:
        data:
          $ref: '#/components/schemas/NullValue'
        error:
          $ref: '#/components/schemas/ErrorObject'
        requestId:
          type: string

    RootData:
      type: object
      required:
        - name
        - status
      properties:
        name:
          type: string
          example: butaqueando-api
        status:
          type: string
          example: ok

    HealthData:
      type: object
      required:
        - ok
        - database
        - timestamp
      properties:
        ok:
          type: boolean
        database:
          type: boolean
        timestamp:
          type: string
          format: date-time

    PlayCardData:
      type: object
      required:
        - id
        - title
        - theaterName
        - availabilityStatus
        - publishedAt
        - reviewCount
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        theaterName:
          type: string
        city:
          type: string
          nullable: true
